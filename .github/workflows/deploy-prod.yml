name: Deploy Prod

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  ECR_REPO: 343218212983.dkr.ecr.us-west-2.amazonaws.com/ballottrack-prod
  INSTANCE_ID: "" # Set after prod is deployed with: cdk deploy --all --context env=prod

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::343218212983:role/ballottrack-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile.prod -t $ECR_REPO:latest -t $ECR_REPO:${{ github.sha }} .
          docker push $ECR_REPO:latest
          docker push $ECR_REPO:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::343218212983:role/ballottrack-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        run: |
          if [ -z "$INSTANCE_ID" ]; then
            echo "::error::INSTANCE_ID not set. Deploy prod infrastructure first, then update this workflow."
            exit 1
          fi

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $INSTANCE_ID \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 120 \
            --parameters 'commands=[
              "aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin 343218212983.dkr.ecr.us-west-2.amazonaws.com",
              "cd /opt/ballottrack",
              "docker compose pull",
              "docker compose up -d",
              "sleep 3",
              "curl -sf http://localhost:80/ > /dev/null && echo HEALTHY || (docker compose logs --tail 20 && exit 1)"
            ]' \
            --query "Command.CommandId" --output text)

          echo "SSM Command: $COMMAND_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "  Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy successful!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "[StandardOutputContent, StandardErrorContent]" --output text
              exit 1
            fi
            sleep 5
          done
          echo "Timed out waiting for deploy"
          exit 1
