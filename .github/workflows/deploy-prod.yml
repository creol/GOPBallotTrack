name: Deploy Prod

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  ECR_REPO: 343218212983.dkr.ecr.us-west-2.amazonaws.com/ballottrack-prod
  INSTANCE_ID: "" # Set after prod is deployed with: cdk deploy --all --context env=prod

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::343218212983:role/ballottrack-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile.prod -t $ECR_REPO:latest -t $ECR_REPO:${{ github.sha }} .
          docker push $ECR_REPO:latest
          docker push $ECR_REPO:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::343218212983:role/ballottrack-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        run: |
          if [ -z "$INSTANCE_ID" ]; then
            echo "::error::INSTANCE_ID not set. Deploy prod infrastructure first, then update this workflow."
            exit 1
          fi

          # Build the remote script in a file so we don't have to hand-escape
          # quotes for the SSM JSON. `set -euo pipefail` makes any step's failure
          # (e.g. `docker compose pull` out of disk) abort the deploy instead of
          # being masked by a healthcheck against the stale container.
          cat > /tmp/remote.sh <<'BASH'
          set -euo pipefail
          IMAGE=343218212983.dkr.ecr.us-west-2.amazonaws.com/ballottrack-prod:latest
          aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin 343218212983.dkr.ecr.us-west-2.amazonaws.com
          cd /opt/ballottrack
          docker compose pull
          EXPECTED=$(docker inspect --format '{{.Id}}' "$IMAGE")
          echo "Expected image: $EXPECTED"
          docker compose up -d
          sleep 5
          RUNNING=$(docker inspect --format '{{.Image}}' ballottrack-app-1)
          echo "Running image:  $RUNNING"
          if [ "$EXPECTED" != "$RUNNING" ]; then
            echo "ERROR: container is not running the freshly pulled image"
            docker compose logs --tail 30
            exit 1
          fi
          curl -sf http://localhost:80/api/health || (docker compose logs --tail 30; exit 1)
          echo
          docker image prune -af
          BASH

          python3 -c 'import json,sys; print(json.dumps({"commands":[open("/tmp/remote.sh").read()]}))' > /tmp/ssm-params.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $INSTANCE_ID \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters file:///tmp/ssm-params.json \
            --query "Command.CommandId" --output text)

          echo "SSM Command: $COMMAND_ID"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "  Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy successful!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" --output text | tail -20
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "[StandardOutputContent, StandardErrorContent]" --output text
              exit 1
            fi
            sleep 5
          done
          echo "Timed out waiting for deploy"
          exit 1
